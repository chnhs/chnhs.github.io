gitalk:
    owner: chnhs
    repo: blog-comments
    clientID: 87119ec75ec32da9260e
    clientSecret: 0d6363f17d552331fc02278f83325e683938172a
# 在使用其它评论组件时可点击显示 Disqus
lazy_load_disqus : false

# ---------------- #
#      Search      #
# ---------------- #
simple_jekyll_search:
    # 是否支持全文搜索
    fulltext: false
    # 最多显示多少条搜索结果
    limit: 10

